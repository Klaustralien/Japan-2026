  {id:"c1",from:"HND Flughafen",to:"Tokyo Hotel",date:"7. Juli",jr:false,option:"Keikyu Line → Toei Asakusa Line",duration:"~50 Min",price:"640 Yen",note:"Umsteigen in Sengakuji. Ankunft HND 16:50 – Hotel ab 15:00 erreichbar."},
  {id:"c2",from:"Tokyo",to:"Ichinomiya",date:"9. Juli",jr:true,option:"JR Sobu-Linie → JR Sotobo-Linie (ab Tokyo Bahnhof)",duration:"~90 Min",price:"1.980 Yen",note:"Züge stündlich. Ziel: Bahnhof Ohara"},
  {id:"c3",from:"Ichinomiya",to:"Tokyo",date:"20. Juli",jr:true,option:"JR Sotobo-Linie → JR Sobu-Linie",duration:"~90 Min",price:"1.980 Yen",note:"Rückweg gleiche Strecke"},
  {id:"c4",from:"Tokyo",to:"Fujikawaguchiko",date:"24. Juli",jr:"partial",option:"Limited Express Kaiji ab Shinjuku → Umstieg Otsuki → Fujikyuko Line",duration:"~2h",price:"4.270 Yen + 1.140 Yen",note:"Kaiji ist KEIN Shinkansen – es ist ein Limited Express auf der Chuo-Linie. Alternativ: Fuji Excursion Direktzug ab Shinjuku (saisonal, kein Umstieg)"},

// State
let activeStation=1, activeTab="cities";
let checked={}, prepChecked={};

async function init(){
  const c=await sbGet("jp2026-checked"); if(c) checked=JSON.parse(c);
  const p=await sbGet("jp2026-prep"); if(p) prepChecked=JSON.parse(p);
  renderTabs(); renderStationNav(); renderCities(); renderConnections(); renderTransport(); renderPrep();
}

function renderTabs(){
  const td=TODOS.filter(t=>checked[t.id]).length, tt=TODOS.length;
  const pd=PREP.filter(p=>prepChecked[p.id]).length, pt=PREP.length;
  const tabs=[["cities","Reiseplan"],["connections","Verbindungen"],["transport",`Buchungen (${td}/${tt})`],["prep",`Vorbereitung (${pd}/${pt})`]];
  document.getElementById("tabs").innerHTML=tabs.map(([k,l])=>`<button class="tab-btn${activeTab===k?" active":""}" onclick="switchTab('${k}')">${l}</button>`).join("");
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll(".view").forEach(v=>v.style.display="none");
  document.getElementById("view-"+tab).style.display="";
  renderTabs();
}

function renderStationNav(){
  document.getElementById("station-nav").innerHTML=STATIONS.map(s=>{
    const ac=s.id===activeStation?(s.solo?" solo":" duo"):"";
    return `<button class="pill${ac}" onclick="selectStation(${s.id})">${s.emoji} ${s.label}</button>`;
  }).join("");
}

function selectStation(id){activeStation=id;renderStationNav();renderCities();}

function renderCities(){
  const s=STATIONS.find(x=>x.id===activeStation);
  const sc=s.solo?"solo":"duo", bc=s.solo?"solo":"duo";
  const nights=s.surfBase?"11 Nächte · Surf-Aufenthalt":s.dayTrip?"Tagesausflug":s.returnFlight?`${s.nights} Nacht · Rückflug`:`${s.nights} ${s.nights===1?"Nacht":"Nächte"}`;

  let dayHTML="";
  if(s.surfBase){
    dayHTML=`<div class="sec-label">Aufenthalt</div><div class="day-card"><div class="day-title">🏄 Surf-Aufenthalt</div><div class="day-text">11 Nächte Surfcamp – Tagesplan wird vor Ort organisiert</div></div>`;
  } else if(s.dayPlans && s.dayPlans.length>0){
    dayHTML=`<div class="sec-label">Tagesplan</div>`+s.dayPlans.map(dp=>`
      <div class="day-card"><div class="day-title">${dp.date}</div>
      ${dp.items.map(i=>`<div class="day-item"><span class="time-tag">${i.t}</span><span class="day-text">${i.x}</span></div>`).join("")}
      </div>`).join("");
  }

  let flightHTML="";
  if(s.returnFlight){
    flightHTML=`<div class="sec-label">Rückflug · 6. August</div>
    <div class="flight-card">
      <div class="day-title">✈️ Direktflug nach Frankfurt</div>
      <div class="flight-row">
        <div><div class="flight-time">09:40</div><div class="flight-ap">HND · T2</div></div>
        <div class="flight-mid">NH223<br>14h 45min</div>
        <div style="text-align:right"><div class="flight-time">17:25</div><div class="flight-ap">FRA · T1</div></div>
      </div>
    </div>`;
  }

  let hotelHTML="";
  if(s.hotel){
    hotelHTML=`<div class="sec-label">Unterkunft</div>
    <div class="hotel-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1;margin-right:10px">
          <div class="hotel-name">${s.hotel.name}</div>
          ${s.hotel.stars?`<div style="font-size:11px;color:#e0a830;margin-top:2px">${s.hotel.stars}</div>`:""}
          <div class="hotel-addr">${s.hotel.address}</div>
        </div>
        <a class="maps-btn" href="${s.hotel.maps}" target="_blank" rel="noopener noreferrer">📍 Maps</a>
      </div>
      <div class="hotel-times">
        <div><div class="hotel-time-label">Check-in</div><div class="hotel-time-val">${s.hotel.checkin}</div></div>
        <div><div class="hotel-time-label">Check-out</div><div class="hotel-time-val">${s.hotel.checkout}</div></div>
      </div>
    </div>`;
  } else if(s.returnFlight){
    hotelHTML=`<div class="sec-label">Unterkunft</div><div class="warn-card">⚠️ Noch zu buchen: Komfort-Hotel direkt am Flughafen – z.B. THE GATE HOTEL Haneda by HULIC</div>`;
  }

  document.getElementById("station-content").innerHTML=`
    <div class="station-card ${sc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="sname">${s.emoji} ${s.city}</div>
          <div class="sdates">${s.start} → ${s.end}</div>
          <div class="snights">${nights}</div>
        </div>
        <div style="text-align:right">
          <span class="badge ${bc}">${s.solo?"Alleine":"Mit Freund"}</span>
          <div class="badge-tag">${s.tag}</div>
        </div>
      </div>
    </div>
    ${dayHTML}${flightHTML}${hotelHTML}`;
}

function renderConnections(){
  const jrBox=`<div class="jr-box">
    <div class="jr-eye">JR Pass Analyse 2026</div>
    <div class="jr-top">
      <div><div class="jr-title">14-Tage JR Pass</div><div class="jr-sub">❌ Nicht empfehlenswert</div></div>
      <div style="text-align:right"><div class="jr-amount">−31.650 Yen</div><div class="jr-amountsub">Verlust vs. Einzeltickets</div></div>
    </div>
    <div class="jr-grid">
      <div class="jr-cell"><div class="jr-cell-label">Pass Kosten</div><div class="jr-cell-val">80.000 Yen</div></div>
      <div class="jr-cell"><div class="jr-cell-label">Strecken-Wert</div><div class="jr-cell-val">48.350 Yen</div></div>
    </div>
    <div class="jr-tip">💡 Empfehlung: Einzeltickets kaufen – spart ~31.650 Yen (~190 EUR)</div>
  </div>`;

  const conns=CONNECTIONS.map(c=>{
    const jrClass=c.jr===true?"jr-yes":c.jr==="partial"?"jr-partial":"jr-no";
    const jrText=c.jr===true?"JR Pass ✓":c.jr==="partial"?"JR teilw.":"Kein JR";
    return `<div class="conn-card">
      <div class="conn-header">
        <div><div class="conn-route">${c.from} → ${c.to}</div><div class="conn-date">${c.date}</div></div>
        <span class="jr-badge ${jrClass}">${jrText}</span>
      </div>
      <div class="conn-option">
        <div class="conn-name">${c.option}</div>
        <div class="conn-meta"><span>🕐 ${c.duration}</span><span>💴 ${c.price}</span></div>
      </div>
      ${c.note?`<div class="conn-note">${c.note}</div>`:""}
    </div>`;
  }).join("");

  document.getElementById("connections-content").innerHTML=jrBox+conns;
}

function renderTodoGroup(items, checkedObj, toggleFn){
  const groups=[...new Set(items.map(i=>i.group))];
  return groups.map(g=>`
    <div class="group-block">
      <div class="group-label">${g}</div>
      ${items.filter(i=>i.group===g).map(i=>`
        <div class="todo-item${checkedObj[i.id]?" done":""}" onclick="${toggleFn}('${i.id}')">
          <div class="todo-check${checkedObj[i.id]?" checked":""}">${checkedObj[i.id]?'<span class="checkmark">✓</span>':""}</div>
          <div>
            <div class="todo-text">${i.text}</div>
            ${i.note?`<div class="todo-note">💡 ${i.note}</div>`:""}
          </div>
        </div>`).join("")}
    </div>`).join("");
}

function renderTransport(){
  const done=TODOS.filter(t=>checked[t.id]).length, total=TODOS.length;
  const pct=Math.round(done/total*100);
  document.getElementById("transport-content").innerHTML=`
    <div class="progress-card">
      <div class="progress-wrap">
        <div class="progress-label">Buchungen & Transport</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="progress-count">${done}/${total}</div>
    </div>
    ${renderTodoGroup(TODOS,checked,"toggleTodo")}`;
}

function renderPrep(){
  const done=PREP.filter(p=>prepChecked[p.id]).length, total=PREP.length;
  const pct=Math.round(done/total*100);
  document.getElementById("prep-content").innerHTML=`
    <div class="progress-card">
      <div class="progress-wrap">
        <div class="progress-label">Vorbereitung</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="progress-count">${done}/${total}</div>
    </div>
    ${renderTodoGroup(PREP,prepChecked,"togglePrep")}`;
}

async function toggleTodo(id){
  checked[id]=!checked[id];
  await sbSet("jp2026-checked",JSON.stringify(checked));
  renderTransport(); renderTabs();
}

async function togglePrep(id){
  prepChecked[id]=!prepChecked[id];
  await sbSet("jp2026-prep",JSON.stringify(prepChecked));
  renderPrep(); renderTabs();
}

init();
</script>
