<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Japan 2026">
<meta name="theme-color" content="#F4F1E9">
<title>Japan Rundreise 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --mono:'IBM Plex Mono',monospace;
  --serif:'Instrument Serif',serif;
  --bg:#F4F1E9;--ink:#1C2647;--muted:#7A809A;--line:#E3DECF;
  --card:#FFFFFF;--accent:#C5372A;--accent-soft:#F3DAD4;
  --node:#26365E;--mapbg:#DCE7EF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100%;position:relative;overflow-x:hidden}

/* MAP */
.map{position:relative;height:340px;overflow:hidden;background:var(--mapbg);flex-shrink:0}
.mapimg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:0}
.routesvg{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.rline{fill:none;stroke:var(--node);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:0.5 9;opacity:.85}
.rfly{fill:none;stroke:var(--node);stroke-width:2;stroke-dasharray:2 7;stroke-linecap:round;opacity:.3}
.pindot{fill:#fff;stroke:var(--node);stroke-width:2.5;transition:all .25s}
.pindot.active{fill:var(--accent);stroke:var(--accent)}
.pinnum{fill:var(--node);font-family:'Manrope',sans-serif;font-weight:800;font-size:11px;text-anchor:middle;dominant-baseline:central;transition:fill .25s}
.pinnum.active{fill:#fff}
.pinhalo{fill:var(--accent);opacity:0;transition:opacity .25s}
.pinhalo.active{opacity:.2}
.pinhit{fill:transparent;cursor:pointer}
.maplegend{position:absolute;left:14px;bottom:14px;display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;background:rgba(255,255,255,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:var(--mono);font-size:10px;letter-spacing:.02em;color:var(--muted);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.legdot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* SHEET */
.sheet{position:relative;z-index:2;background:var(--bg);border-radius:24px 24px 0 0;margin-top:-22px;padding:22px 20px 120px;box-shadow:0 -10px 26px rgba(0,0,0,.05)}
.kicker{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.triptitle{margin-top:7px;font-family:var(--serif);font-size:36px;line-height:1;color:var(--ink)}
.tripmeta{margin-top:7px;color:var(--muted);font-size:13.5px}
.stats{display:flex;align-items:stretch;margin-top:17px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.stat{flex:1;padding:13px 4px;text-align:center}
.statnum{font-weight:800;font-size:21px;letter-spacing:-.01em;color:var(--ink)}
.statlab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.vline{width:1px;background:var(--line);margin:11px 0}

/* TIMELINE */
.timeline{margin-top:18px;padding-bottom:8px}
.leg{position:relative;padding-left:44px;padding-top:7px;padding-bottom:7px}
.legline{position:absolute;left:14px;top:0;bottom:0;width:2px;background:repeating-linear-gradient(to bottom,var(--line) 0 5px,transparent 5px 10px)}
.legpill{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.01em;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 13px;white-space:nowrap;cursor:pointer;width:100%}
.legarr{color:var(--accent);font-weight:700}
.legchev{margin-left:auto;width:7px;height:7px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg);transition:transform .2s;opacity:.5;flex-shrink:0}
.legchev.open{transform:rotate(225deg)}
.viadet{margin-top:9px;background:var(--card);border-radius:14px;padding:13px 15px;box-shadow:0 1px 2px rgba(27,37,64,.05),0 10px 22px rgba(27,37,64,.05)}
.detline{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:4px 0}
.detk{flex-shrink:0;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.detv{text-align:right;font-size:13px;color:var(--ink)}
.dnote{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.4}
.dlink{display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--accent);text-decoration:none}

.stop{position:relative;padding-left:44px;padding-bottom:4px}
.stopline{position:absolute;left:14px;top:0;bottom:0;width:2px;background:repeating-linear-gradient(to bottom,var(--line) 0 5px,transparent 5px 10px)}
.node{position:absolute;left:1px;top:1px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;z-index:1;background:var(--node);color:#fff;cursor:pointer;transition:background .25s;flex-shrink:0}
.node.active{background:var(--accent)}
.card{background:var(--card);border-radius:16px;padding:14px 15px;box-shadow:0 1px 2px rgba(27,37,64,.05),0 10px 22px rgba(27,37,64,.05);transition:box-shadow .25s}
.card.active{box-shadow:0 0 0 1.5px var(--accent),0 1px 2px rgba(27,37,64,.05),0 10px 22px rgba(27,37,64,.05)}
.cardtop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.cityline{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;min-width:0}
.city{font-family:var(--serif);font-size:25px;line-height:1.05;color:var(--ink)}
.kanji{color:var(--muted);font-size:15px;font-weight:600}
.nights-pill{flex-shrink:0;background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:11px;padding:5px 11px;border-radius:999px;white-space:nowrap}
.subline{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:4px}
.dates{color:var(--muted);font-size:12px;font-family:var(--mono)}
.wx{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.wxdot{width:7px;height:7px;border-radius:50%;background:#E0A23B;flex-shrink:0}
.companion{display:inline-block;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:999px;margin-top:5px}
.companion.solo{background:#e8ecf5;color:var(--node)}
.companion.duo{background:#e5f2ea;color:#1a6044}
.divider{height:1px;background:var(--line);margin:11px 0 4px}
.erow{display:flex;align-items:flex-start;gap:11px;width:100%;background:none;border:none;padding:9px 0 0;text-align:left;cursor:pointer;font:inherit;color:inherit}
.metalab{flex-shrink:0;width:64px;font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding-top:3px}
.metaval{font-size:13px;line-height:1.38;color:var(--ink);flex:1;min-width:0}
.clip{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.chev{flex-shrink:0;width:7px;height:7px;border-right:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg);transition:transform .2s;margin-top:5px;opacity:.5;color:var(--muted)}
.chev.open{transform:rotate(225deg)}
.exp{margin-top:9px;padding:12px 14px;background:var(--bg);border-radius:12px}
.hlitem{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.hlitem:last-child{border-bottom:none}
.hltext{display:flex;flex-direction:column;min-width:0}
.hlname{font-weight:600;font-size:13px;color:var(--ink)}
.hlnote{font-size:11.5px;color:var(--muted);margin-top:1px}
.hllink{flex-shrink:0;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);text-decoration:none;white-space:nowrap}
.notebody{font-size:13px;line-height:1.5;color:var(--ink)}
.noteedit{display:inline-block;margin-top:9px;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted)}

/* FINISH */
.finish{position:relative;padding-left:44px;margin-top:8px;display:flex;align-items:center;min-height:38px}
.finishline{position:absolute;left:14px;top:-16px;height:24px;width:2px;background:repeating-linear-gradient(to bottom,var(--line) 0 5px,transparent 5px 10px)}
.finishnode{position:absolute;left:3px;top:6px;width:24px;height:24px;border-radius:6px;transform:rotate(45deg);background:var(--accent)}
.finishtxt{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.02em;color:var(--muted)}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:rgba(244,241,233,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,12px));z-index:200}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:color .15s}
.navbtn.active{color:var(--accent)}
.navicon{font-size:18px;line-height:1}

/* OVERLAYS */
.overlay{position:fixed;inset:0;max-width:430px;margin:0 auto;z-index:300;pointer-events:none;display:flex;flex-direction:column;justify-content:flex-end}
.overlay.open{pointer-events:all}
.overlay-backdrop{position:absolute;inset:0;background:rgba(28,38,71,.4);opacity:0;transition:opacity .3s;cursor:pointer}
.overlay.open .overlay-backdrop{opacity:1}
.overlay-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:0 0 calc(20px + env(safe-area-inset-bottom,12px));max-height:88vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.28,1);box-shadow:0 -10px 40px rgba(0,0,0,.15)}
.overlay.open .overlay-sheet{transform:translateY(0)}
.overlay-handle{width:36px;height:4px;border-radius:2px;background:var(--line);margin:12px auto 0}
.overlay-header{padding:14px 20px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.overlay-title{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
.overlay-close{background:none;border:none;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--muted);padding:4px 8px}
.overlay-body{overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}

/* OVERLAY CONTENT */
.jr-box{background:var(--node);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px}
.jr-eye{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8899bb;margin-bottom:6px}
.jr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.jr-ttl{font-size:15px;font-weight:700}
.jr-sub{font-size:12px;color:#ff9999;margin-top:2px}
.jr-amt{font-size:18px;font-weight:700;color:#ff9999}
.jr-amtsub{font-size:11px;color:#8899bb}
.jr-grid{display:flex;gap:10px;margin-bottom:10px}
.jr-cell{flex:1;background:rgba(255,255,255,.1);border-radius:8px;padding:8px 10px}
.jr-clabel{font-size:10px;color:#8899bb}
.jr-cval{font-size:14px;font-weight:700;margin-top:2px}
.jr-tip{font-size:12px;color:#aabbcc;line-height:1.5}
.conn-card{background:var(--card);border-radius:14px;padding:13px 15px;margin-bottom:10px;box-shadow:0 1px 2px rgba(27,37,64,.04),0 4px 14px rgba(27,37,64,.06)}
.conn-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.conn-route{font-size:13px;font-weight:700;color:var(--ink)}
.conn-date{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.jr-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;margin-left:8px;font-family:var(--mono)}
.jr-yes{background:#e5f2ea;color:#1a6044}
.jr-no{background:#fee5e5;color:#8b0000}
.jr-partial{background:#fff3cd;color:#7a5f00}
.conn-opt{background:var(--bg);border-radius:8px;padding:9px 11px;margin-bottom:7px}
.conn-name{font-size:13px;font-weight:600;color:var(--node)}
.conn-meta{display:flex;gap:14px;margin-top:5px;font-size:11.5px;color:var(--muted)}
.conn-note{font-size:11.5px;color:var(--muted);line-height:1.5}
.progress-card{background:var(--card);border-radius:14px;padding:13px 15px;margin-bottom:14px;display:flex;align-items:center;gap:14px;box-shadow:0 1px 2px rgba(27,37,64,.04)}
.progress-wrap{flex:1}
.progress-label{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:6px}
.progress-bar{height:5px;background:var(--line);border-radius:3px}
.progress-fill{height:5px;border-radius:3px;background:#1a6044;transition:width .4s}
.progress-count{font-size:22px;font-weight:800;color:var(--node)}
.grp-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px 2px}
.todo-item{background:var(--card);border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:opacity .15s;box-shadow:0 1px 2px rgba(27,37,64,.04)}
.todo-item.done{opacity:.4}
.todo-check{width:20px;height:20px;border-radius:5px;flex-shrink:0;margin-top:1px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;transition:all .15s}
.todo-check.checked{background:#1a6044;border-color:#1a6044}
.ckmark{color:#fff;font-size:12px;font-weight:700;line-height:1}
.todo-text{font-size:13px;line-height:1.4;color:var(--ink)}
.todo-item.done .todo-text{text-decoration:line-through}
.todo-note{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono);line-height:1.4}
.grp-block{margin-bottom:4px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- MAP -->
  <div class="map">
    <img class="mapimg" src="https://commons.wikimedia.org/wiki/Special:FilePath/Japan_relief_location_map.jpg?width=820" alt="Reliefkarte von Japan">
    <svg class="routesvg" viewBox="0 0 402 340" preserveAspectRatio="none" id="routesvg">
      <!-- Route polyline -->
      <polyline class="rline" points="265,156 275,163 262,161 248,162 236,151 225,152 215,146 201,170 202,175 197,175 150,180"/>
      <!-- Return flight arc -->
      <path class="rfly" d="M150,180 Q200,95 265,156"/>
      <!-- Pins injected by JS -->
      <g id="pins"></g>
    </svg>
    <div class="maplegend"><span class="legdot"></span>Geplante Route &middot; 12 Stationen &middot; ca. 1.900 km</div>
  </div>

  <!-- SHEET -->
  <div class="sheet">
    <div class="kicker">Reiseplan 2026</div>
    <div class="triptitle">Japan Rundreise</div>
    <div class="tripmeta">Klaus &middot; 7. Juli &ndash; 6. August 2026</div>
    <div class="stats">
      <div class="stat"><div class="statnum">30</div><div class="statlab">N&auml;chte</div></div>
      <div class="vline"></div>
      <div class="stat"><div class="statnum">12</div><div class="statlab">Stationen</div></div>
      <div class="vline"></div>
      <div class="stat"><div class="statnum" id="daystogo">–</div><div class="statlab">Tage bis Start</div></div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottomnav">
    <button class="navbtn active" id="nav-plan" onclick="showNav('plan')"><span class="navicon">🗺</span>Reiseplan</button>
    <button class="navbtn" id="nav-conn" onclick="showNav('conn')"><span class="navicon">🚆</span>Verbindungen</button>
    <button class="navbtn" id="nav-book" onclick="showNav('book')"><span class="navicon">✅</span>Buchungen</button>
    <button class="navbtn" id="nav-prep" onclick="showNav('prep')"><span class="navicon">📋</span>Vorbereitung</button>
  </div>

  <!-- OVERLAY: VERBINDUNGEN -->
  <div class="overlay" id="ov-conn">
    <div class="overlay-backdrop" onclick="closeOverlay('conn')"></div>
    <div class="overlay-sheet">
      <div class="overlay-handle"></div>
      <div class="overlay-header">
        <div class="overlay-title">Verbindungen</div>
        <button class="overlay-close" onclick="closeOverlay('conn')">Schliessen</button>
      </div>
      <div class="overlay-body" id="conn-body"></div>
    </div>
  </div>

  <!-- OVERLAY: BUCHUNGEN -->
  <div class="overlay" id="ov-book">
    <div class="overlay-backdrop" onclick="closeOverlay('book')"></div>
    <div class="overlay-sheet">
      <div class="overlay-handle"></div>
      <div class="overlay-header">
        <div class="overlay-title">Buchungen &amp; Transport</div>
        <button class="overlay-close" onclick="closeOverlay('book')">Schliessen</button>
      </div>
      <div class="overlay-body" id="book-body"></div>
    </div>
  </div>

  <!-- OVERLAY: VORBEREITUNG -->
  <div class="overlay" id="ov-prep">
    <div class="overlay-backdrop" onclick="closeOverlay('prep')"></div>
    <div class="overlay-sheet">
      <div class="overlay-handle"></div>
      <div class="overlay-header">
        <div class="overlay-title">Vorbereitung</div>
        <button class="overlay-close" onclick="closeOverlay('prep')">Schliessen</button>
      </div>
      <div class="overlay-body" id="prep-body"></div>
    </div>
  </div>

</div>
<script>
// ─── SUPABASE ────────────────────────────────────────────────────────────────
const sb = supabase.createClient(

async function sbGet(k){try{const{data}=await sb.from('planner_state').select('value').eq('key',k).maybeSingle();return data?data.value:null;}catch(e){return localStorage.getItem(k);}}

  {num:2,city:'Ichinomiya',kanji:'\u4e00\u5bae',nights:'11 N\u00e4chte',dates:'9.\u201320. Juli',solo:true,
   weather:'\u226428\u00b0 \u00b7 Pazifikk\u00fcste, Wellengang',
   pin:{cx:276,cy:163},
   hotel:{name:'Airbnb bei Mikako',addr:'73-10 Misakich\u014bnakahara, Isumi-shi',checkin:'Check-in 15:00 \u00b7 Check-out 11:00',maps:'https://maps.google.com/?q=35.3009884,140.4069229'},
   via:{label:'JR Sobu \u2192 Sotobo-Linie',time:'ca. 90 Min',dep:'Tokyo Bhf.',arr:'Bhf. Ohara',note:'Stündlich, kein Vorausbuchen nötig'},
   hl:[

     {name:'Lokale Surferszene',note:'11 Tage eintauchen und entspannen'}
   ],

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  const c=await sbGet('jp2026-checked'); if(c) checked=JSON.parse(c);
  const p=await sbGet('jp2026-prep'); if(p) prepChecked=JSON.parse(p);
  // Days to go
  const dep=new Date(2026,6,7);
  const dtg=Math.max(0,Math.round((dep-new Date())/86400000));
  document.getElementById('daystogo').textContent=dtg;
  renderPins();
  renderTimeline();
  renderConnOverlay();
  renderBookOverlay();
  renderPrepOverlay();
}

    const ac=activePin===s.num?'active':'';
    return `<g class="pingroup" onclick="activatePin(${s.num})">
      <circle class="pinhalo ${ac}" cx="${cx}" cy="${cy}" r="20"/>
      <circle class="pinhit" cx="${cx}" cy="${cy}" r="17"/>
      <circle class="pindot ${ac}" cx="${cx}" cy="${cy}" r="11"/>
      <text class="pinnum ${ac}" x="${cx}" y="${cy}">${s.num}</text>
    </g>`;
  }).join('');
}

function activatePin(n){
  activePin=n;
  renderPins();
  // scroll to station
  const el=document.getElementById('stop'+n);
  if(el){
    const r=el.getBoundingClientRect();
    window.scrollBy({top:r.top-120,behavior:'smooth'});
    updateActiveCards();
  }
}

function updateActiveCards(){
  document.querySelectorAll('.node').forEach(el=>{
    el.classList.toggle('active',el.dataset.num===String(activePin));
  });
  document.querySelectorAll('.card').forEach(el=>{
    el.classList.toggle('active',el.dataset.num===String(activePin));
  });
}

// ─── TIMELINE ────────────────────────────────────────────────────────────────
function mq(name,city){return'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(name+', '+city+', Japan');}
function mqDir(city){return'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(city+', Japan')+'&travelmode=transit';}

function toggle(key){
  openSections[key]=!openSections[key];
  renderTimeline();
  updateActiveCards();
}

function setActive(n){
  activePin=n;
  renderPins();
  updateActiveCards();
}

function renderTimeline(){
  const tl=document.getElementById('timeline');
  let html='';
  STOPS.forEach((s,i)=>{
    const isFirst=i===0;
    const nightsLabel=s.nights==='Rückflug'?'R\u00fcckflug':s.nights;
    const compCls=s.solo?'solo':'duo';
    const compTxt=s.solo?'Alleine':'Mit Freund';
    const nodeAc=activePin===s.num?'active':'';
    const cardAc=activePin===s.num?'active':'';
    const vKey='v'+s.num, hKey='h'+s.num, lKey='l'+s.num, nKey='n'+s.num;

    // Via pill
    let viaHTML='';
    if(s.via && !isFirst){
      const vOpen=openSections[vKey];
      viaHTML=`<div class="leg"><div class="legline"></div>
        <button class="legpill" onclick="toggle('${vKey}')">
          <span class="legarr">\u2192</span>${s.via.label} &middot; ${s.via.time}
          <span class="legchev ${vOpen?'open':''}"></span>
        </button>
        ${vOpen?`<div class="viadet">
          <div class="detline"><span class="detk">Abfahrt</span><span class="detv">${s.via.dep}</span></div>
          <div class="detline"><span class="detk">Ankunft</span><span class="detv">${s.via.arr}</span></div>
          <div class="detline"><span class="detk">Dauer</span><span class="detv">${s.via.time}</span></div>
          ${s.via.note?`<div class="dnote">${s.via.note}</div>`:''}
          <a class="dlink" href="${mqDir(s.city)}" target="_blank" rel="noopener">Route in Google Maps \u2192</a>
        </div>`:''}
      </div>`;
    }

    // Hotel section
    let hotelHTML='';
    if(s.hotel){
      const hOpen=openSections[hKey];
      hotelHTML=`<button class="erow" onclick="toggle('${hKey}')">
        <span class="metalab">Unterkunft</span>
        <span class="metaval">${s.hotel.name}</span>
        <span class="chev ${hOpen?'open':''}"></span>
      </button>
      ${hOpen?`<div class="exp">
        <div class="detline"><span class="detk">Adresse</span><span class="detv">${s.hotel.addr}</span></div>
        <div class="detline"><span class="detk">Check-in</span><span class="detv">${s.hotel.checkin}</span></div>
        <a class="dlink" href="${s.hotel.maps}" target="_blank" rel="noopener">In Google Maps \u00f6ffnen \u2192</a>
      </div>`:''}`;
    } else if(s.num===9){
      hotelHTML=`<div class="erow" style="cursor:default">
        <span class="metalab">Unterkunft</span>
        <span class="metaval" style="color:var(--muted);font-style:italic">Tagesausflug \u2013 kein Hotel</span>
      </div>`;
    } else {
      hotelHTML=`<div class="erow" style="cursor:default">
        <span class="metalab">Unterkunft</span>
        <span class="metaval" style="color:var(--accent);font-weight:600">Noch zu buchen!</span>
      </div>`;
    }

    // Highlights
    const lOpen=openSections[lKey];
    const hlSummary=s.hl.map(h=>h.name).join(' \u00b7 ');
    const hlHTML=`<button class="erow" onclick="toggle('${lKey}')">
      <span class="metalab">Highlights</span>
      <span class="metaval clip">${hlSummary}</span>
      <span class="chev ${lOpen?'open':''}"></span>
    </button>
    ${lOpen?`<div class="exp">${s.hl.map(h=>`
      <div class="hlitem">
        <div class="hltext"><span class="hlname">${h.name}</span><span class="hlnote">${h.note}</span></div>
        <a class="hllink" href="${mq(h.name,s.city)}" target="_blank" rel="noopener">In Maps \u2192</a>
      </div>`).join('')}</div>`:''}`;

    // Notes
    const nOpen=openSections[nKey];
    const noteHTML=s.note?`<button class="erow" onclick="toggle('${nKey}')">
      <span class="metalab">Notizen</span>
      <span class="metaval clip">${s.note}</span>
      <span class="chev ${nOpen?'open':''}"></span>
    </button>
    ${nOpen?`<div class="exp"><div class="notebody">${s.note}</div></div>`:''}`:'' ;

    html+=`
      ${viaHTML}
      <div class="stop" id="stop${s.num}">
        <div class="stopline"></div>
        <div class="node ${nodeAc}" data-num="${s.num}" onclick="setActive(${s.num})">${s.num}</div>
        <div class="card ${cardAc}" data-num="${s.num}">
          <div class="cardtop">
            <div class="cityline">
              <span class="city">${s.city}</span>
              <span class="kanji">${s.kanji}</span>
            </div>
            <span class="nights-pill">${nightsLabel}</span>
          </div>
          <div class="subline">
            <span class="dates">${s.dates}</span>
            <span class="wx"><span class="wxdot"></span>${s.weather}</span>
          </div>
          <span class="companion ${compCls}">${compTxt}</span>
          <div class="divider"></div>
          ${hotelHTML}
          ${hlHTML}
          ${noteHTML}
        </div>
      </div>`;
  });

  html+=`<div class="finish">
    <div class="finishline"></div>
    <div class="finishnode"></div>
    <span class="finishtxt">HEIMREISE &middot; 6. August &middot; NH223 FRA</span>
  </div>`;

  tl.innerHTML=html;
}

// ─── OVERLAYS ────────────────────────────────────────────────────────────────
function showNav(tab){
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='plan'){closeAll();}
  else if(tab==='conn'){openOverlay('conn');}
  else if(tab==='book'){openOverlay('book');}
  else if(tab==='prep'){openOverlay('prep');}
}

function openOverlay(name){
  document.getElementById('ov-'+name).classList.add('open');
}
function closeOverlay(name){
  document.getElementById('ov-'+name).classList.remove('open');
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-plan').classList.add('active');
}
function closeAll(){
  ['conn','book','prep'].forEach(n=>document.getElementById('ov-'+n).classList.remove('open'));
}

function renderConnOverlay(){
  const jr=`<div class="jr-box">
    <div class="jr-eye">JR Pass Analyse 2026</div>
    <div class="jr-top">
      <div><div class="jr-ttl">14-Tage JR Pass</div><div class="jr-sub">\u274c Nicht empfehlenswert</div></div>
      <div style="text-align:right"><div class="jr-amt">\u221231.650 Yen</div><div class="jr-amtsub">Verlust vs. Einzeltickets</div></div>
    </div>
    <div class="jr-grid">
      <div class="jr-cell"><div class="jr-clabel">Pass Kosten</div><div class="jr-cval">80.000 Yen</div></div>
      <div class="jr-cell"><div class="jr-clabel">Strecken-Wert</div><div class="jr-cval">48.350 Yen</div></div>
    </div>
    <div class="jr-tip">\ud83d\udca1 Einzeltickets sparen ~31.650 Yen (~190 EUR). Shinkansen online buchen.</div>
  </div>`;

  const cards=CONNECTIONS.map(c=>{
    const bc=c.jr===true?'jr-yes':c.jr==='partial'?'jr-partial':'jr-no';
    const bt=c.jr===true?'JR \u2713':c.jr==='partial'?'JR teilw.':'Kein JR';
    return`<div class="conn-card">
      <div class="conn-head">
        <div><div class="conn-route">${c.from} \u2192 ${c.to}</div><div class="conn-date">${c.date}</div></div>
        <span class="jr-badge ${bc}">${bt}</span>
      </div>
      <div class="conn-opt">
        <div class="conn-name">${c.option}</div>
        <div class="conn-meta"><span>\ud83d\udd50 ${c.dur}</span><span>\ud83d\udcb4 ${c.price}</span></div>
      </div>
      ${c.note?`<div class="conn-note">${c.note}</div>`:''}
    </div>`;
  }).join('');

  document.getElementById('conn-body').innerHTML=jr+cards;
}

function renderTodoList(items, checkedObj, toggleFn, bodyId){
  const groups=[...new Set(items.map(i=>i.group))];
  const done=items.filter(i=>checkedObj[i.id]).length;
  const total=items.length;
  const pct=Math.round(done/total*100);
  const progressHTML=`<div class="progress-card">
    <div class="progress-wrap">
      <div class="progress-label">Fortschritt</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="progress-count">${done}/${total}</div>
  </div>`;
  const groupsHTML=groups.map(g=>`
    <div class="grp-block">
      <div class="grp-label">${g}</div>
      ${items.filter(i=>i.group===g).map(i=>`
        <div class="todo-item${checkedObj[i.id]?' done':''}" onclick="${toggleFn}('${i.id}')">
          <div class="todo-check${checkedObj[i.id]?' checked':''}">${checkedObj[i.id]?'<span class="ckmark">\u2713</span>':''}</div>
          <div>
            <div class="todo-text">${i.text}</div>
            ${i.note?`<div class="todo-note">\ud83d\udca1 ${i.note}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`).join('');
  document.getElementById(bodyId).innerHTML=progressHTML+groupsHTML;
}

function renderBookOverlay(){renderTodoList(TODOS,checked,'toggleTodo','book-body');}
function renderPrepOverlay(){renderTodoList(PREP,prepChecked,'togglePrep','prep-body');}

async function toggleTodo(id){
  checked[id]=!checked[id];
  await sbSet('jp2026-checked',JSON.stringify(checked));
  renderBookOverlay();
}
async function togglePrep(id){
  prepChecked[id]=!prepChecked[id];
  await sbSet('jp2026-prep',JSON.stringify(prepChecked));
  renderPrepOverlay();
}

init();
</script>
</body>
</html>
