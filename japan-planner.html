    const SUPABASE_KEY  = "sb_publishable_7W0SQWy-0MYAd2ED-chyUQ_OODZrbfo";

    // Supabase-Client
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Speicher-Hilfsfunktionen
    async function sbGet(key) {
      try {
        const { data } = await sb.from("planner_state").select("value").eq("key", key).maybeSingle();
        return data ? data.value : null;
      } catch(e) {
        console.error("sbGet error:", e);
        return localStorage.getItem(key); // Fallback
      }
    }
    async function sbSet(key, value) {
      try {
        await sb.from("planner_state").upsert({ key, value, updated_at: new Date().toISOString() });
        localStorage.setItem(key, value); // Lokaler Cache
      } catch(e) {
        console.error("sbSet error:", e);
        localStorage.setItem(key, value); // Fallback
      }
    }

                    display:"flex",alignItems:"center",justifyContent:"center"
                  }}>
                    {checked[t.id] && <span style={{color:"white",fontSize:12,fontWeight:700}}>✓</span>}
                  </div>
                  <div>
                    <div style={{fontSize:13,lineHeight:1.4,textDecoration:checked[t.id]?"line-through":"none"}}>{t.text}</div>
                    {t.note && <div style={{fontSize:11,color:"#9a9a9a",marginTop:3}}>💡 {t.note}</div>}
                  </div>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<JapanPlanner />);
    document.getElementById("loading").style.display = "none";
  </script>
</body>
</html>
